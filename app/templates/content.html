{% extends "base.html" %}{% block content %}<div class="page-heading"><div><span class="eyebrow">COPILOTO CRIATIVO</span><h1>Conteúdo com IA</h1><p>A IA sugere. Sua equipe revisa e decide.</p></div></div><div class="row g-4"><div class="col-lg-5"><form class="panel vstack gap-3" id="contentForm"><h2>Briefing</h2><div><label class="form-label">Produto ou serviço</label><input class="form-control" name="product" required></div><div><label class="form-label">Público-alvo</label><input class="form-control" name="audience" required></div><div><label class="form-label">Objetivo</label><input class="form-control" name="objective" required></div><div class="row g-3"><div class="col-6"><label class="form-label">Tom</label><select class="form-select" name="tone"><option>profissional</option><option>acolhedor</option><option>direto</option><option>descontraído</option></select></div><div class="col-6"><label class="form-label">Canal</label><select class="form-select" name="channel"><option value="whatsapp">WhatsApp</option><option value="instagram">Instagram</option><option value="facebook">Facebook</option></select></div></div><div><label class="form-label">Informações obrigatórias</label><textarea class="form-control" name="required_information" rows="3"></textarea></div><button class="btn btn-primary btn-lg"><i class="bi bi-stars"></i> Gerar sugestão</button></form></div><div class="col-lg-7"><div class="panel h-100"><div class="d-flex justify-content-between"><h2>Resultado editável</h2><span id="aiProvider" class="badge text-bg-light">Aguardando briefing</span></div><textarea id="generatedContent" class="form-control result-editor" placeholder="O conteúdo aparecerá aqui. Revise todas as informações antes de aprovar."></textarea><div class="d-flex gap-2 mt-3 flex-wrap"><button id="copyContent" class="btn btn-outline-secondary"><i class="bi bi-copy"></i> Copiar</button><button id="approveContent" class="btn btn-success" disabled><i class="bi bi-check2"></i> Aprovar para campanha</button></div><p class="small text-muted mt-3 mb-0">O sistema nunca publica conteúdo gerado automaticamente.</p></div></div></div>{% endblock %}
