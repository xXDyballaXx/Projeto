{% extends "base.html" %}{% block public_content %}<div class="auth-page"><div class="auth-card wide"><a class="brand text-dark" href="/"><span class="brand-mark">D</span> Divulgaí IA</a><h1>Crie sua conta</h1><p class="text-muted">Comece com uma operação organizada e responsável.</p><form id="registerForm" class="row g-3"><div class="col-md-6"><label class="form-label">Seu nome</label><input class="form-control" name="name" required minlength="2"></div><div class="col-md-6"><label class="form-label">Empresa</label><input class="form-control" name="company_name" required minlength="2"></div><div class="col-12"><label class="form-label">E-mail</label><input class="form-control" name="email" type="email" required></div><div class="col-md-6"><label class="form-label">Senha</label><input class="form-control" name="password" type="password" required minlength="8"></div><div class="col-md-6"><label class="form-label">Confirmar senha</label><input class="form-control" name="password_confirmation" type="password" required minlength="8"></div><div class="col-12 form-check ms-2"><input class="form-check-input" name="accept_terms" type="checkbox" id="terms" required><label class="form-check-label" for="terms">Aceito os <a href="/termos">termos</a> e a <a href="/privacidade">política de privacidade</a>.</label></div><div class="col-12"><button class="btn btn-primary btn-lg w-100">Criar conta</button></div></form><hr><p class="text-center mb-0">Já tem conta? <a href="/login">Entrar</a></p></div></div>{% endblock %}
