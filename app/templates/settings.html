{% extends "base.html" %}{% block content %}<div class="page-heading"><div><span class="eyebrow">SUA CONTA</span><h1>Configurações</h1><p>Perfil, empresa, segurança e limites internos.</p></div></div><div class="row g-4"><div class="col-lg-7"><form class="panel vstack gap-3" id="settingsForm"><h2>Perfil e empresa</h2><input class="form-control" name="name" placeholder="Seu nome"><input class="form-control" name="company" placeholder="Empresa"><input class="form-control" name="email" type="email" placeholder="E-mail"><select class="form-select" name="timezone"><option value="">Fuso horário</option><option>America/Sao_Paulo</option><option>America/Manaus</option><option>America/Recife</option><option>America/Cuiaba</option></select><input class="form-control" name="daily_limit" type="number" min="1" max="100000" placeholder="Limite diário interno"><textarea class="form-control" name="unsubscribe_policy" rows="3" placeholder="Política de cancelamento e descadastro"></textarea><button class="btn btn-primary">Salvar alterações</button></form></div><div class="col-lg-5"><form class="panel vstack gap-3" id="passwordForm"><h2>Alterar senha</h2><input class="form-control" name="current_password" type="password" placeholder="Senha atual" required><input class="form-control" name="new_password" type="password" placeholder="Nova senha (letras e números)" minlength="8" required><button class="btn btn-outline-primary">Atualizar senha</button></form></div></div>{% endblock %}
