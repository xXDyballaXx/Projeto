services:
  app:
    build: .
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    ports: ["8000:8000"]
    volumes: ["uploads:/app/uploads"]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: unless-stopped
  worker:
    build: .
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info
    env_file: .env
    volumes: ["uploads:/app/uploads"]
    depends_on: [db, redis]
    restart: unless-stopped
  beat:
    build: .
    command: celery -A app.tasks.celery_app:celery_app beat --loglevel=info
    env_file: .env
    depends_on: [db, redis]
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-divulgai}
      POSTGRES_USER: ${POSTGRES_USER:-divulgai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-divulgai}
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-divulgai} -d $${POSTGRES_DB:-divulgai}"], interval: 5s, timeout: 5s, retries: 10}
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: ["redis_data:/data"]
    healthcheck: {test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 10}
volumes:
  postgres_data:
  redis_data:
  uploads:

